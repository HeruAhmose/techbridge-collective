# ─────────────────────────────────────────────────────────────────
# SELF-LEARNING CONFIGURATION
# ─────────────────────────────────────────────────────────────────
self_learning:
  enabled: true
  
  rag_sync:
    source: "confluence"
    sync_interval_minutes: 60
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
    vector_store: "chromadb"
    reindex_on_kb_update: true

  routing_optimization:
    algorithm: "bayesian_bandit"
    reward_signal: "correct_first_route"
    penalty_signal: "reroute_count"
    exploration_rate: 0.1
    min_samples_before_override: 50

  severity_calibration:
    model: "gradient_boosted_classifier"
    retrain_schedule: "weekly"
    drift_alert_threshold: 0.1  # AUC drop
    features:
      - "category"
      - "subcategory"
      - "scope_indicator"
      - "critical_path_flag"
      - "time_of_day"
      - "hub_id"

  prompt_evolution:
    framework: "dspy"
    eval_schedule: "biweekly"
    golden_tickets_min: 500
    promote_threshold: 0.05  # improvement over current

  canary_deployment:
    traffic_percentage: 5
    duration_hours: 48
    rollback_on_regression: true

  human_gates:
    taxonomy_change: true
    routing_rule_change: true
    playbook_promotion: true
    model_promotion: true
