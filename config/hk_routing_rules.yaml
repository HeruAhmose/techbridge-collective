# ─────────────────────────────────────────────────────────────────
# SEVERITY SCORING RULES
# ─────────────────────────────────────────────────────────────────
severity_rules:
  # Deterministic severity assignment based on signals
  # Priority = severity × scope × SLA × tier

  auto_s0:
    description: "Automatic S0 — immediate response"
    conditions:
      - "security.account_compromise AND evidence.active_session"
      - "security.malware AND evidence.spreading"
      - "ANY category AND evidence.data_exfiltration"
      - "ANY category AND evidence.legal_obligation"
    response_target_minutes: 15
    auto_escalate: true
    notify: ["secops-oncall", "system-admin"]

  auto_s1:
    description: "Automatic S1 — critical"
    conditions:
      - "security.phishing AND evidence.credentials_entered"
      - "ANY category AND scope.org_wide"
      - "access_identity.ANY AND scope.many_users"
      - "network.ANY AND scope.entire_site"
    response_target_minutes: 60
    auto_escalate: true
    notify: ["oncall-primary"]

  auto_s2:
    description: "Automatic S2 — major"
    conditions:
      - "access_identity.ANY AND requester.tier == 'vip'"
      - "ANY category AND scope.team"
      - "app.ANY AND evidence.critical_workflow_blocked"
    response_target_hours: 4

  default_mapping:
    # If no auto-rule matches, use category defaults
    security: "S1"  # Security is always at least S1
    access_identity: "S3"
    endpoint: "S3"
    network: "S3"
    app: "S3"
    hardware: "S4"
    how_to: "S4"
    fulfillment: "S4"

# ─────────────────────────────────────────────────────────────────
# ROUTING RULES
# ─────────────────────────────────────────────────────────────────
routing_rules:
  # Priority order: security overrides > severity overrides > category defaults

  security_override:
    description: "All security-tagged issues bypass normal routing"
    condition: "classification.category == 'security' OR tags CONTAINS 'security'"
    route_to:
      queue: "Security-Ops"
      team: "SecOps"
      escalate: true
    notify: ["secops-oncall"]

  critical_severity_override:
    description: "S0/S1 issues go to on-call regardless of category"
    condition: "severity IN ['S0', 'S1']"
    route_to:
      escalate: true
    notify: ["oncall-primary", "hub-admin"]

  outage_deflection:
    description: "If known outage matches, deflect with status + ETA"
    condition: "status_page.active_incident MATCHES classification"
    action: "deflect_with_status"
    message_template: |
      We're aware of an ongoing issue with {service_name}.
      Status: {incident_status}
      ETA: {eta}
      Updates: {status_page_url}
      
      Your report has been logged. You'll be notified when this is resolved.

  hub_hours_routing:
    description: "During hub hours, prefer in-person Navigator support"
    condition: "current_time WITHIN tenant.hours AND severity IN ['S3', 'S4']"
    action: "suggest_in_person"
    message_template: |
      Your {hub_name} hub is currently open! A Digital Navigator can help you
      in person right now at {hub_address}.
      
      Would you like to continue here with H.K., or visit the hub?

  community_digital_literacy:
    description: "How-to and digital literacy go to Navigators"
    condition: "classification.category IN ['how_to'] OR classification.subcategory IN ['job_applications', 'documents', 'telehealth', 'government_portals', 'basic_computer', 'email_basics']"
    route_to:
      queue: "Community-Digital-Literacy"
      team: "Navigators"
      escalate: false

  default_routing:
    description: "Fall through to category default queue"
    condition: "ALWAYS"
    action: "use_taxonomy_defaults"

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE GATING
# ─────────────────────────────────────────────────────────────────
confidence_thresholds:
  safe_fix:
    minimum: 0.80
    description: "Confidence required to attempt automated fix"
    allowed_risk_levels: ["low"]
    must_be_reversible: true

  classify:
    minimum: 0.65
    description: "Confidence required to accept classification"
    fallback: "CLARIFY"
    max_clarification_rounds: 3

  auto_escalate:
    below: 0.50
    description: "Below this, escalate immediately with evidence plan"
    action: "ESCALATE"
    message: "I need more context than I can gather here. Routing to a specialist."

  self_learned_floor:
    minimum: 0.65
    description: "Self-learned routes/fixes can never drop below this"

# ─────────────────────────────────────────────────────────────────
# ESCALATION POLICIES
# ─────────────────────────────────────────────────────────────────
escalation_policies:
  always_escalate_categories:
    - "security"
    - "data_loss"

  always_escalate_tags:
    - "legal"
    - "compliance"
    - "outage"
    - "data_breach"

  time_based_escalation:
    - condition: "session.age_minutes > 15 AND state == 'CLARIFY'"
      action: "escalate"
      reason: "Clarification timeout"
    - condition: "session.age_minutes > 30 AND state != 'CLOSED'"
      action: "escalate"
      reason: "Session timeout"

  navigator_takeover:
    description: "Digital Navigator can take over any active session"
    allowed_roles: ["digital_navigator", "hub_admin", "system_admin"]
    audit_required: true

# ─────────────────────────────────────────────────────────────────
# ACTION SAFETY POLICIES
# ─────────────────────────────────────────────────────────────────
action_safety:
  allowlist_only: true
  
  require_confirmation:
    - "restart_service"
    - "disable_account"
    - "wipe_device"
    - "delete_data"
    - "policy_change"
    - "reset_password"

  never_allow:
    - "execute_arbitrary_code"
    - "access_financial_systems"
    - "modify_security_policy"
    - "export_bulk_data"

  safe_actions:
    description: "These can be suggested without confirmation"
    actions:
      - "clear_browser_cache"
      - "restart_browser"
      - "try_incognito_mode"
      - "check_caps_lock"
      - "reconnect_wifi"
      - "restart_device"
      - "check_disk_space"
      - "run_speed_test"
      - "update_app"
      - "check_status_page"

# ─────────────────────────────────────────────────────────────────
# DATA HANDLING POLICIES
# ─────────────────────────────────────────────────────────────────
data_handling:
  redact_secrets: true
  pii_minimization: true
  retention_days: 365
  
  redaction_patterns:
    - name: "SSN"
      pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
      replacement: "[REDACTED-SSN]"
    - name: "Credit Card"
      pattern: "\\b(?:\\d{4}[- ]?){3}\\d{4}\\b"
      replacement: "[REDACTED-CC]"
    - name: "Phone"
      pattern: "\\b(?:\\+1)?\\(?\\d{3}\\)?[\\s.-]?\\d{3}[\\s.-]?\\d{4}\\b"
      replacement: "[REDACTED-PHONE]"
    - name: "Email Address"
      pattern: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"
      replacement: "[REDACTED-EMAIL]"
    - name: "Password"
      pattern: "(?i)(?:password|pwd|pass)\\s*[:=]\\s*\\S+"
      replacement: "[REDACTED-PASSWORD]"
    - name: "API Key"
      pattern: "(?i)(?:api[_-]?key|token|secret)\\s*[:=]\\s*[A-Za-z0-9_\\-]{20,}"
      replacement: "[REDACTED-API-KEY]"

  never_store:
    - "passwords"
    - "mfa_codes"
    - "private_keys"
    - "ssn"
    - "credit_card_numbers"
    - "bank_account_numbers"

