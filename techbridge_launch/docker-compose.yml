services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: techbridge
      POSTGRES_PASSWORD: techbridge
      POSTGRES_DB: techbridge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techbridge -d techbridge"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    environment:
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://techbridge:techbridge@db:5432/techbridge

      # Clerk (set real keys in .env.local or your platform env)
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_dummy}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_dummy}

      # Chatbase
      NEXT_PUBLIC_CHATBASE_BOT_ID: ${NEXT_PUBLIC_CHATBASE_BOT_ID:-3ylVDc3243y5659rIjvcd}
      CHATBOT_IDENTITY_SECRET: ${CHATBOT_IDENTITY_SECRET:-change-me}

      # Optional role automation
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      NAVIGATOR_EMAILS: ${NAVIGATOR_EMAILS:-}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
